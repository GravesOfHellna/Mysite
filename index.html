<!DOCTYPE html>
<html>
<head>
  <title>الفحل النجفي الأصيل</title>
  <style>
    /* ===========================
       1️⃣ الخطوط والخلفية الرئيسية
       =========================== */
    @font-face {
      font-family: 'PNU BOLD';
      src: url(data:font/woff;base64,PUT-YOUR-BASE64-HERE) format('woff');
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(
        to bottom,
        #000000 0%,     
        #555555 80%,    
        #555555 80%,    
        #000000 100%    
      ); /* الخلفية مع Fade */
      color: #e0e0e0;
      font-family: 'PNU BOLD', monospace;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ===========================
       2️⃣ نصوص العنوان والفقرات
       =========================== */
    h1 {
      font-size: 3em;
      color: #ff4c4c;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.5em;
    }

    /* ===========================
       3️⃣ رموز القبور والهياكل العظمية
       =========================== */
    .grave {
      margin-top: 30px;
      font-size: 5em;
    }

    /* ===========================
       4️⃣ زر الإعدادات/الجمجمة
       =========================== */
    .skull-menu {
      position: fixed;
      top: 20px;
      left: 20px;
      cursor: pointer;
      z-index: 100;
    }

    .skull {
      width: 50px;
      height: 50px;
      background: #e0e0e0;
      border-radius: 50%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .eye {
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      margin: 2px;
    }

    .lines {
      margin-top: 4px;
    }

    .lines div {
      width: 20px;
      height: 2px;
      background: #000;
      margin: 2px 0;
    }
  </style>
</head>
<body>

  <!-- ===========================
       زر الإعدادات/الجمجمة
       =========================== -->
<!-- زر الهامبرغر -->
<div class="menu-btn" onclick="openModal()">
  <div></div>
  <div></div>
  <div></div>
</div>

  <span class="close-btn" onclick="closeModal()">✖</span>
  <h2>القائمة</h2>
  <a href="#">الصفحة الرئيسية</a>
  <p>تحت التطوير 1</p>
  <p>تحت التطوير 2</p>
  <p>تحت التطوير 3</p>
  <p>تحت التطوير 4</p>
  </div>
  <!-- ===========================
       العنوان الرئيسي
       =========================== -->
  <h1>الفحل النجفي الأصيل</h1>

  <!-- ===========================
       فقرة الترحيب
       =========================== -->
  <p>نورتوا بمقبرة وادي السلام 👻</p>

  <!-- ===========================
       رموز القبور والهياكل العظمية
       =========================== -->
  <div class="grave">💀⚰️💀</div>

</body>
</html>
