<!DOCTYPE html>
<html>
<head>
  <title>الفحل النجفي الأصيل</title>
  <style>
    body {
      margin: 0;
      height: 100vh; /* طول كامل الشاشة */
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.8) 0%,      /* فوق أسود */
        #808080 15%,              /* رصاصي يبدأ من بعد 15% */
        #808080 85%,              /* رصاصي حتى قبل النهاية */
        rgba(0,0,0,0.8) 100%      /* تحت أسود */
      );
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-size: 3em;
      color: #ff4c4c;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.5em;
    }

    .grave {
      margin-top: 30px;
      font-size: 5em;
    }
  </style>
</head>
<body>
  <h1>الفحل النجفي الأصيل</h1>
  <p>نورتوا بمقبرة وادي السلام 👻</p>
  <div class="grave">💀⚰️💀</div>
</body>
</html>
