<!DOCTYPE html>
<html>
<head>
  <title>موقع الفحل النجفي</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(to bottom, #000000 0%, #555555 80%, #555555 80%, #000000 100%);
      color: #e0e0e0;
      font-family: 'PNU BOLD', monospace;
      text-align: center;
      overflow-x: hidden;
    }
    h1 {
      color: #ff4c4c;
      margin-top: 50px;
    }
    p {
      font-size: 1.2rem;
    }
    /* زر الهامبرغر */
    .menu-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 30px;
      cursor: pointer;
      z-index: 1000;
    }
    .menu-btn div {
      height: 5px;
      background: #e0e0e0;
      margin: 5px 0;
      border-radius: 3px;
    }
    /* نافذة Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      color: #fff;
      font-family: 'PNU BOLD', monospace;
      z-index: 999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .modal h2 {
      margin-bottom: 20px;
      font-size: 2rem;
    }
    .modal a, .modal p {
      color: #ff4c4c;
      font-size: 1.5rem;
      margin: 10px 0;
      text-decoration: none;
    }
    .close-btn {
      position: absolute;
      top: 20px; right: 20px;
      font-size: 2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="menu-btn" onclick="openModal()">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <div class="modal" id="menuModal">
    <span class="close-btn" onclick="closeModal()">✖</span>
    <h2>القائمة</h2>
    <a href="index.html">الصفحة الرئيسية</a>
    <a href="videos.html">الفيديوهات</a>
    <p>تحت التطوير 2</p>
    <p>تحت التطوير 3</p>
    <p>تحت التطوير 4</p>
  </div>

  <h1>اهلا بالجلاقة</h1>
  <p>نورتوا</p>

  <script>
    function openModal() {
      document.getElementById('menuModal').style.display = 'flex';
    }
    function closeModal() {
      document.getElementById('menuModal').style.display = 'none';
    }
  </script>
</body>
</html>
